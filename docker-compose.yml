# ============================================
# Oil CRM — Docker Compose (Dev + Production)
# ============================================
# Frontend deploys on Vercel — this is backend only.
#
# Usage:
#   docker compose up --build        (dev)
#   docker compose -f docker-compose.yml up -d  (prod)

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    environment:
      - NODE_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/api/v1/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
